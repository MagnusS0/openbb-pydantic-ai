name: Test

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync (dev + pdf extra) — locked
        run: uv sync --locked --dev --extra pdf

      - name: Run regression contract gate
        run: uv run pytest -m regression_contract

      - name: Run full tests
        run: uv run pytest tests --ignore=tests/smoke
